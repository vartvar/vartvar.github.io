<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vartvar</title>

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #111111;
      color: #292929;
      font-family: "Courier New", Courier, monospace;
    }

    main {
      padding: 2rem;
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.4rem);
      letter-spacing: 0.03em;
    }
  </style>
</head>

<body>
  <main>Vartvar awaits The Great Zubada...</main>
</body>
</html>
